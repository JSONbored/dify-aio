name: CI / Dify AIO

on:
  push:
    branches: [main]
    paths:
      - "*.xml"
      - ".github/**"
      - ".github/workflows/**"
      - ".trunk/**"
      - "AGENTS.md"
      - "CHANGELOG.md"
      - "Dockerfile"
      - "README.md"
      - "SECURITY.md"
      - "SUPPORT.md"
      - "assets/**"
      - "cliff.toml"
      - "components.toml"
      - "components/**"
      - "docs/**"
      - "docs/upstream/**"
      - "pyproject.toml"
      - "renovate.json"
      - "requirements-dev.txt"
      - "rootfs/**"
      - "scripts/**"
      - "tests/**"
      - "upstream.toml"
  pull_request:
    branches: [main]
    paths:
      - "*.xml"
      - ".github/**"
      - ".github/workflows/**"
      - ".trunk/**"
      - "AGENTS.md"
      - "CHANGELOG.md"
      - "Dockerfile"
      - "README.md"
      - "SECURITY.md"
      - "SUPPORT.md"
      - "assets/**"
      - "cliff.toml"
      - "components.toml"
      - "components/**"
      - "docs/**"
      - "docs/upstream/**"
      - "pyproject.toml"
      - "renovate.json"
      - "requirements-dev.txt"
      - "rootfs/**"
      - "scripts/**"
      - "tests/**"
      - "upstream.toml"
  workflow_dispatch:
    inputs:
      run_extended_integration:
        description: Run sidecar-backed external provider integration tests
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  aio-build:
    uses: JSONbored/aio-fleet/.github/workflows/aio-build.yml@c4099c09cb2375a0f5a5a822a0f8af02a77d0526
    permissions:
      contents: read
      packages: write
      pull-requests: write
    with:
      app_slug: dify-aio
      image_name: jsonbored/dify-aio
      workflow_title: CI / Dify AIO
      docker_cache_scope: dify-aio-image
      pytest_image_tag: dify-aio:pytest
      publish_profile: dify
      upstream_name: Dify
      image_description: Unraid-first AIO wrapper image for Dify
      python_version: "3.13"
      trunk_org_slug: aethereal
      publish_platforms: linux/amd64,linux/arm64
      checkout_submodules: false
      integration_pytest_args: tests/integration -m integration
      run_extended_integration: ${{ github.event_name == 'workflow_dispatch' && inputs.run_extended_integration }}
      extended_integration_pytest_args: tests/integration -m extended_integration
      generator_check_command: python3 scripts/generate_dify_template.py --check
      upstream_digest_arg: UPSTREAM_IMAGE_DIGEST
      catalog_published: true
      xml_paths: |
        *.xml
        assets/**
      extra_publish_paths: |

      catalog_assets: |
        dify-aio.xml|dify-aio.xml
        assets/app-icon.png|icons/dify.png
    secrets: inherit
